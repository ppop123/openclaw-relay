#:schema node_modules/wrangler/config-schema.json
name = "openclaw-relay"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[durable_objects]
bindings = [
  { name = "RELAY_CHANNEL", class_name = "RelayChannel" }
]

[[migrations]]
tag = "v1"
new_classes = ["RelayChannel"]

# --- Deploy to your custom domain ---
# Uncomment and update with your domain:
#
# [[routes]]
# pattern = "relay.yourdomain.com"
# custom_domain = true
